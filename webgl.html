<canvas id="canvas" width="1024" height="768" />
<script type="module">

let gl, program, buffer, texture;
let canvasWidth, canvasHeight;
let canvasW = 1024, canvasH = 768;

function initGL(canvas, img1, img2) {
  gl = canvas.getContext("webgl", { alpha: false });
  canvasWidth = canvas.width;
  canvasHeight = canvas.height;

  // --- Shaders ---
  const vs = `
    attribute vec2 aPos;
    attribute vec2 aUV;
    uniform vec2 uResolution;
    varying vec2 vUV;
    void main() {
      vec2 zeroToOne = aPos / uResolution;
      vec2 zeroToTwo = zeroToOne * 2.0;
      vec2 clip = zeroToTwo - 1.0;
      gl_Position = vec4(clip * vec2(1, -1), 0, 1);
      vUV = aUV;
    }
  `;

  const fs = `
    precision mediump float;
    uniform sampler2D uTex;
    varying vec2 vUV;
    void main() {
      gl_FragColor = texture2D(uTex, vUV);
    }
  `;

  program = createProgram(vs, fs);
  gl.useProgram(program);

  buffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buffer);

  const aPos = gl.getAttribLocation(program, "aPos");
  const aUV = gl.getAttribLocation(program, "aUV");
  gl.enableVertexAttribArray(aPos);
  gl.enableVertexAttribArray(aUV);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 16, 0);
  gl.vertexAttribPointer(aUV, 2, gl.FLOAT, false, 16, 8);

  const uResolution = gl.getUniformLocation(program, "uResolution");
  gl.uniform2f(uResolution, canvasWidth, canvasHeight);

  // --- Texture ---
  gl.activeTexture(gl.TEXTURE0);
  texture = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  // gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, false);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img1);

  gl.activeTexture(gl.TEXTURE0);
  texture = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  // gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, false);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img2);

  // --- Blending ---
	gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  gl.clearColor(0, 0, 0, 1);

  window.gl = gl;
}

function drawSprites(sprites) {
  // gl.clear(gl.COLOR_BUFFER_BIT);

  const verts = new Float32Array(sprites.length * 6 * 4);
  let i = 0;

  for (const s of sprites) {
    const depth = s.depth;
    const x = s.x;
    const y = s.y;
    const width = s.width;
    const height = s.height;

    const u0 = 0;
    const v0 = 0;
    const u1 = 1;
    const v1 = 1;

    // two triangles
    verts.set([
      x, y, u0, v0,
      x + width, y, u1, v0,
      x, y + height, u0, v1,

      x, y + height, u0, v1,
      x + width, y, u1, v0,
      x + width, y + height, u1, v1,
    ], i);

    i += 24;
  }

  gl.bufferData(gl.ARRAY_BUFFER, verts, gl.DYNAMIC_DRAW);
  gl.drawArrays(gl.TRIANGLES, 0, sprites.length * 6);
}

function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    throw gl.getShaderInfoLog(s);
  }
  return s;
}

function createProgram(vsSrc, fsSrc) {
  const p = gl.createProgram();
  gl.attachShader(p, createShader(gl.VERTEX_SHADER, vsSrc));
  gl.attachShader(p, createShader(gl.FRAGMENT_SHADER, fsSrc));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    throw gl.getProgramInfoLog(p);
  }
  return p;
}

const img1 = new Image();
img1.src = "/0f0.png";
const img2 = new Image();
img2.src = "/15f1.png";
setTimeout(() => {
  initGL(canvas, img1, img2);
  console.log(gl.MAX_COMBINED_TEXTURE_IMAGE_UNITS);

  drawSprites([
    { x: 64, y: 64, width: 116, height: 67, u: 0, v: 0 },
  ]);
  // drawSprites([
  //   { x: 0, y: 0, width: 179, height: 119, u: 0, v: 0 },
  // ]);
}, 300);

</script>
